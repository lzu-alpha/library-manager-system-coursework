spring:
  datasource:
    driverClassName: org.h2.Driver
    url: jdbc:h2:mem:library_manager_system;MODE=MySQL;DATABASE_TO_LOWER=TRUE;NON_KEYWORDS=USER;DB_CLOSE_DELAY=-1
    username: sa
    password:
  sql:
    init:
      mode: always
      schema-locations: classpath:schema.sql
      data-locations: classpath:data.sql
      encoding: UTF-8

mybatis:
  mapper-locations: classpath:mapper/*.xml
  type-aliases-package: com.zbw.domain
  configuration:
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl

server:
  port: 8080

logging:
  level:
    com.zbw.mapper: debug
    org.springframework.jdbc.datasource.init: debug
    org.springframework.test.context.transaction: info
